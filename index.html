<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Plataforma Académica</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">

</head>

<body class="min-h-screen bg-gradient-to-br from-gray-100 via-blue-50 to-gray-200 flex items-center justify-center">

    <div class="bg-white shadow-xl rounded-xl overflow-hidden flex flex-col md:flex-row w-full max-w-5xl">

        <!-- Panel izquierdo -->
        <div class="md:w-1/2 bg-gray-50 flex flex-col justify-center items-center p-10 text-center">

            <h1 class="text-4xl font-bold text-blue-600 mb-4">
                Sistema Académico
            </h1>

            <p class="text-gray-600 max-w-sm">
                PLATAFORMA DE INSCRIPCIÓN Y CONTROL DE CURSOS ELECTIVOS.
            </p>

            <img src="img/logo-03.jpg" class="w-56 mt-8 opacity-80">

        </div>

        <!-- Panel derecho -->
        <div class="md:w-1/2 p-10">

            <h2 class="text-2xl font-bold text-gray-700 text-center mb-6">
                Iniciar sesión
            </h2>

            <form class="space-y-5">

                <div>
                    <label class="text-gray-600 text-sm">Usuario</label>
                    <input type="text" class="input">
                </div>

                <div>
                    <label class="text-gray-600 text-sm">Contraseña</label>
                    <input type="password" class="input">
                </div>

                <div class="space-y-3">

                    <button type="button" onclick="ingresarEstudiante()" class="btn-estudiante">
                        Ingresar como Estudiante
                    </button>

                    <button type="button" onclick="ingresarDocente()" class="btn-docente">
                        Ingresar como Docente
                    </button>

                    <button type="button" onclick="ingresarAdmin()" class="btn-admin">
                        Ingresar como Administrador
                    </button>

                </div>

            </form>

        </div>

    </div>

    <script src="js/script.js"></script>

</body>

</html>
