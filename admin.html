<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Panel Administrador</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <div class="bg-gray-800 text-white flex justify-between items-center p-4">
        <h1 class="text-lg font-bold">Panel Administrador</h1>

        <button onclick="window.location.href='index.html'" class="bg-red-500 px-4 py-1 rounded">
            Cerrar sesión
        </button>
    </div>

    <div class="flex">

        <div class="w-64 bg-white h-screen shadow p-4">

            <h2 class="font-semibold mb-4">Administración</h2>

            <ul class="space-y-3">

                <li class="hover:text-gray-700 cursor-pointer">
                    Gestionar cursos
                </li>

                <li class="hover:text-gray-700 cursor-pointer">
                    Gestionar estudiantes
                </li>

                <li class="hover:text-gray-700 cursor-pointer">
                    Gestionar docentes
                </li>

                <li class="hover:text-gray-700 cursor-pointer">
                    Reportes
                </li>

            </ul>

        </div>

        <div class="flex-1 p-6">

            <h2 class="text-2xl font-semibold mb-4">
                Panel de Administración
            </h2>

            <div class="bg-white p-4 rounded shadow">
                Aquí puedes gestionar toda la plataforma.
            </div>

        </div>

    </div>

</body>

</html>
